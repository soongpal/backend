# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Soongpal Java CI with Gradle

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    - name: Build with Gradle Wrapper
      run: ./gradlew build -x test

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: soongpal
        path: build/libs/*[!plain].jar

  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: soongpal
        path: ./artifact

    - name: Transfer JAR to EC2
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        source: "artifact/*.jar"
        target: "/home/ubuntu"

    - name: Execute production deployment script on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        script: |
          echo "${{ secrets.APPLICATION_YAML }}" > /home/ubuntu/application.yaml
          echo "${{ secrets.FIREBASE_KEY_JSON }}" > /home/ubuntu/firebase-service-key.json
          
          pkill -f '.*\.jar' || true
          
          JAR_FILE=$(find /home/ubuntu -maxdepth 1 -name "*[!plain].jar" | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "ERROR: JAR file not found!"
            exit 1
          fi
          
          echo "--- Starting application: $JAR_FILE ---"
          
          nohup java -Xmx512m -jar "$JAR_FILE" \
            --spring.config.location=file:/home/ubuntu/application.yaml \
            > /home/ubuntu/app.log 2>&1 < /dev/null & disown || true
          
          echo "✅ Deployment finished. Logs at /home/ubuntu/app.log"
          
