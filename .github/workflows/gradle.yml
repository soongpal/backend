name: Soongpal Java CI with Gradle

on:
  push:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    - name: Build with Gradle Wrapper
      run: ./gradlew build -x test
      
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: soongpal-artifact
        path: build/libs/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: soongpal-artifact

    - name: 불필요한 plain.jar 파일 삭제
      run: rm *-plain.jar

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ap-northeast-2

    - name: Upload JAR to S3
      run: |
        JAR_FILE=$(find . -name "*.jar")
        aws s3 cp $JAR_FILE s3://${{ secrets.S3_BUCKET_NAME }}/soongpal-latest.jar

    - name: Deploy to EC2 via SSM
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "#!/bin/bash",
            "set -e",
            "mkdir -p /home/ubuntu/firebase",
            "echo \"${{ secrets.APPLICATION_YAML }}\" > /home/ubuntu/application.yaml",
            "echo "${{ secrets.FIREBASE_KEY_JSON }}" | base64 --decode > /home/ubuntu/firebase/soongpal-firebase-adminsdk-fbsvc-2ece748ec4.json"
            "aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/soongpal-latest.jar /home/ubuntu/soongpal-0.0.1-SNAPSHOT.jar",
            "chown ubuntu:ubuntu /home/ubuntu/soongpal-0.0.1-SNAPSHOT.jar",
            "sudo systemctl restart soongpal"
          ]' \
          --query "Command.CommandId" --output text
