# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Soongpal Java CI with Gradle

on:
  push:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    - name: Build with Gradle Wrapper
      run: ./gradlew build -x test

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: soongpal
        path: build/libs/*[!plain].jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: soongpal
        path: ./artifact

    - name: Transfer JAR to EC2
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        source: "artifact/*.jar"
        target: "/home/ubuntu"

    - name: Execute final production deployment script
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        script: |
          # 1. Create the directory and config files
          mkdir -p /home/ubuntu/firebase
          echo "${{ secrets.APPLICATION_YAML }}" > /home/ubuntu/application.yaml
          echo "${{ secrets.FIREBASE_KEY_JSON }}" > /home/ubuntu/firebase/soongpal2-65857-firebase-adminsdk-fbsvc-37398551d6.json
          
          # 2. Rename the new JAR file to a consistent name
          mv /home/ubuntu/*[!plain].jar /home/ubuntu/soongpal-0.0.1-SNAPSHOT.jar
          
          # 3. Restart the service using systemd
          sudo systemctl restart soongpal
